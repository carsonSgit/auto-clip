<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>auto-clip</title>
  <style>
    :root { --bg: #0f1b2d; --panel: #16263d; --accent: #3ba7f0; --text: #e8eef5; --muted: #8aa0b8; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 880px; margin: 0 auto; padding: 2rem 1rem; }
    h1 { font-size: 1.4rem; } h1 a { color: var(--text); text-decoration: none; }
    h1 span { color: var(--accent); }
    .panel { background: var(--panel); border-radius: 10px; padding: 1.25rem; margin-bottom: 1.5rem; }
    label { display: block; margin: .75rem 0 .25rem; color: var(--muted); font-size: .85rem; }
    input[type=text], input[type=number], textarea, input[type=file] {
      width: 100%; padding: .5rem; border-radius: 6px; border: 1px solid #2a3f5c;
      background: var(--bg); color: var(--text); font: inherit;
    }
    textarea { min-height: 5rem; }
    .knobs { display: flex; gap: 1rem; } .knobs > div { flex: 1; }
    button { margin-top: 1rem; background: var(--accent); color: #06121f; border: 0; padding: .6rem 1.4rem;
             border-radius: 6px; font-weight: 600; cursor: pointer; font: inherit; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: .5rem; border-bottom: 1px solid #2a3f5c; font-size: .9rem; }
    a { color: var(--accent); }
    .status { display: inline-block; padding: .1rem .5rem; border-radius: 999px; font-size: .8rem; }
    .status.complete, .status.transcribed { background: #1d4d33; color: #7de0a8; }
    .status.failed { background: #4d1d1d; color: #e07d7d; }
    .status.queued { background: #2a3f5c; color: var(--muted); }
    .status.running { background: #2a3f5c; color: var(--accent); }
    .error-box { background: #4d1d1d; color: #e0a3a3; padding: .75rem 1rem; border-radius: 6px; white-space: pre-wrap; }
    .muted { color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1><a href="/">auto<span>-clip</span></a> <small class="muted" style="font-weight:normal">event footage &rarr; branded social clips</small></h1>
    {% block content %}{% endblock %}
  </div>
</body>
</html>
