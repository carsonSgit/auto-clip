services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://autoclip:autoclip@postgres:5432/autoclip
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media-data:/data
      - ./data/outputs:/outputs
      - ./data/samples:/samples
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A autoclip.pipeline.celery_app worker --loglevel=info --concurrency=1
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://autoclip:autoclip@postgres:5432/autoclip
      REDIS_URL: redis://redis:6379/0
    volumes:
      - media-data:/data
      - ./data/outputs:/outputs
      - model-cache:/root/.cache
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  redis:
    image: redis:7-alpine

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: autoclip
      POSTGRES_PASSWORD: autoclip
      POSTGRES_DB: autoclip
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoclip"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  media-data:
  model-cache:
  pg-data:
